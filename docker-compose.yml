services:
  postgres:
    image: postgres:16-alpine
    container_name: bmp_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: bmp_db
      POSTGRES_USER: bmp_user
      POSTGRES_PASSWORD: bmp_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bmp_user -d bmp_db"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data: